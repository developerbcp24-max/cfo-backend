    const SERVER_URL = "http://localhost:3000";

    // Escuchar el evento binancePrices
    socket.on("binancePrices", (data) => {

      // Actualizar tabla de BUY
      // --- Tabla BUY ---
      const tbodyBuy = document.querySelector("#resultTableBuy tbody");
      tbodyBuy.innerHTML = "";
      const minBuyPrice = Math.min(...data.buy.map(item => parseFloat(item.precio)));

      data.buy.forEach((item, index) => {
        const currentPrice = parseFloat(item.precio);
        const highlightClass = currentPrice === minBuyPrice ? "table-success" : "";
        const row = `<tr class="${highlightClass}">
          <td>${item.precio}</td>
          <td>${item.minimo}</td>
          <td>${item.maximo}</td>
        </tr>`;
        tbodyBuy.innerHTML += row;
      });

      // Actualizar tabla de SELL
      // --- Tabla SELL ---
      const tbodySell = document.querySelector("#resultTableSell tbody");
      tbodySell.innerHTML = "";
      const maxBuyPrice = Math.max(...data.sell.map(item => parseFloat(item.precio)));
      data.sell.forEach((item, index) => {
        const currentPrice = parseFloat(item.precio);
        const highlightClass = currentPrice === maxBuyPrice ? "table-danger" : "";
        const row = `<tr class="${highlightClass}">
          <td>${item.precio}</td>
          <td>${item.minimo}</td>
          <td>${item.maximo}</td>
        </tr > `;
        tbodySell.innerHTML += row;
      });


      // --- Contadores de Compra ---
      const tbodyCounterBuy = document.querySelector("#counterTableBuy tbody");
      tbodyCounterBuy.innerHTML = "";

      const conteoBuy = {};
      data.buy.forEach(item => {
        const precio = parseFloat(item.precio).toFixed(2);
        conteoBuy[precio] = (conteoBuy[precio] || 0) + 1;
      });

      // Ordenar precios descendente y tomar los 3 primeros
      const preciosBuyOrdenados = Object.keys(conteoBuy).sort((a, b) => parseFloat(b) - parseFloat(a));
      const topBuy = preciosBuyOrdenados.slice(0, 3);

      topBuy.forEach((precio, index) => {
        const row = `<tr>
          <td>Contador${index + 1}</td>
          <td>${precio}</td>
          <td>${conteoBuy[precio]}</td>
        </tr>`;
        tbodyCounterBuy.innerHTML += row;
      });

      // --- Contadores de Venta ---
      const tbodyCounterSell = document.querySelector("#counterTableSell tbody");
      tbodyCounterSell.innerHTML = "";

      const conteoSell = {};
      data.sell.forEach(item => {
        const precio = parseFloat(item.precio).toFixed(2);
        conteoSell[precio] = (conteoSell[precio] || 0) + 1;
      });

      // Ordenar precios descendente y tomar los 3 primeros
      const preciosSellOrdenados = Object.keys(conteoSell).sort((a, b) => parseFloat(b) - parseFloat(a));
      const topSell = preciosSellOrdenados.slice(0, 3);

      topSell.forEach((precio, index) => {
        const row = `<tr>
          <td>Contador${index + 1}</td>
          <td>${precio}</td>
          <td>${conteoSell[precio]}</td>
        </tr>`;
        tbodyCounterSell.innerHTML += row;
      });
    });

    function showAlert(message, type = "danger") {
      const alertBox = document.getElementById("alertBox");
      const alertMessage = document.getElementById("alertMessage");
