<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Registro de Compras Cripto</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-4">
  <h2 class="mb-4 text-center">Calculadora Cripto</h2>

  <form id="compraForm" class="mb-4">
    <div class="mb-3">
      <label for="monto" class="form-label">Monto en Bs:</label>
      <input type="number" id="monto" step="0.01" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="cambio" class="form-label">Tipo de cambio:</label>
      <input type="number" id="cambio" step="0.01" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">Calcular</button>
  </form>

  <table id="tablaResultados" class="table table-striped table-bordered">
    <thead class="table-dark">
      <tr>
        <th>Tipo de Cambio</th>
        <th>Cripto Recibido</th>
        <th>Total (tipoCambio * Cripto)</th>
        <th>Ganancia (Bs)</th>
        <th>Total en Bs</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    document.getElementById("compraForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const monto = parseFloat(document.getElementById("monto").value);
      const cambio = parseFloat(document.getElementById("cambio").value);

      const tbody = document.querySelector("#tablaResultados tbody");
      tbody.innerHTML = "";

      const criptoInicial = monto / cambio;

      for (let i = 0; i < 25; i++) {
        const tipoCambio = cambio + (i * 0.01);
        const convert = criptoInicial * tipoCambio;
        const totalBs = convert - monto;
        const totalTotal = monto + totalBs;

        const fila = `
          <tr>
            <td>${tipoCambio.toFixed(2)}</td>
            <td>${criptoInicial.toFixed(2)}</td>
            <td>${convert.toFixed(2)}</td>
            <td>${totalBs.toFixed(2)}</td>
            <td>${totalTotal.toFixed(2)}</td>
          </tr>
        `;
        tbody.innerHTML += fila;
      }
    });
  </script>
</body>

</html>
