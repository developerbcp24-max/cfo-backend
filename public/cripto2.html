<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Simulación Venta Cripto</title>
</head>

<body>
    <div>

        <div>42.75 * 9.34 usdt = 400 bs (06-03-2026)</div>

        <h2>Simulación de Venta Cripto</h2>
        <label>Cantidad de Cripto</label>
        <input type="number" step="0.000001" id="cantidadCripto" value="681.58">
        <label>Tipo de cambio inicial (Bs por cripto)</label>
        <input type="number" step="0.01" id="tipoCambio" value="9.13">
        <button onclick="simular()">Simular</button>
        <div id="resultado"></div>
    </div>
    <script>
        function simular() {
            const cantidadCripto = parseFloat(document.getElementById('cantidadCripto').value);
            const tipoCambioInicial = parseFloat(document.getElementById('tipoCambio').value);

            // Valor inicial de venta
            const valorInicialBs = cantidadCripto * tipoCambioInicial;

            let html = `<p>Vendiendo <b>${cantidadCripto}</b> cripto al tipo de cambio <b>${tipoCambioInicial}</b>, recibes <b>${valorInicialBs.toFixed(2)}</b> Bs.</p>`;
            html += `<table border="1" cellpadding="5">
                <thead>
                  <tr>
                    <th>Tipo de Cambio</th>
                    <th>Valor de Venta (Usdt)</th>
                    <th>Ganancia (Bs)</th>
                    <th>Total en Bs</th>
                  </tr>
                </thead>
                <tbody>`;

            // Generar 15 incrementos de tipo de cambio (0.5)

            let cambio = 0
            for (let i = 0; i < 50; i++) {
                const tipoCambio = tipoCambioInicial + cambio;
                const valorVenta = cantidadCripto;
                const ganancia = (valorVenta * tipoCambio) - valorInicialBs;
                const totalBs = valorInicialBs + ganancia;
                cambio += 0.01;

                html += `<tr>
                  <td>${tipoCambio.toFixed(2)}</td>
                  <td>${valorVenta.toFixed(2)}</td>
                  <td>${ganancia.toFixed(2)}</td>
                  <td>${totalBs.toFixed(2)}</td>
                </tr>`;
            }

            html += `</tbody></table>`;
            document.getElementById('resultado').innerHTML = html;
        }
    </script>
</body>

</html>
