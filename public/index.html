<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Subir archivos</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">

  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
    }

    h4 {
      color: #ffffff;
    }

    /* Tablas en modo oscuro */
    .table {
      color: #e0e0e0;
      background-color: #1e1e1e;
    }

    .table thead {
      background-color: #2c2c2c;
      color: #ffffff;
    }

    .table-bordered td,
    .table-bordered th {
      border: 1px solid #444;
    }

    /* Resaltar filas */
    .table-success {
      background-color: #2e7d32 !important;
      /* verde oscuro */
      color: #fff;
    }

    .table-danger {
      background-color: #c62828 !important;
      /* rojo oscuro */
      color: #fff;
    }

    input[type="file"],
    button {
      background-color: #2c2c2c;
      color: #e0e0e0;
      border: 1px solid #444;
      padding: 5px 10px;
      border-radius: 4px;
    }

    button:hover {
      background-color: #3a3a3a;
    }

    a {
      color: #90caf9;
    }

    a:hover {
      color: #64b5f6;
    }

    .alert {
      background-color: #b71c1c;
      color: #fff;
    }
  </style>


</head>

<body>
  <div class="container">
    <div style="display: none;">
      <h4>Subir archivos al servidor</h4>
      <form id="uploadForm">
        <input type="file" id="fileInput" name="file" multiple>
        <button type="submit">Subir</button>
      </form>
      <ul id="fileList"></ul>
    </div>
    <br>
    <br>
    <div class="row">
      <div class="col">
        <!-- <h4>Precios de Compra (BUY)</h4> -->
        <table class="table table-dark table-striped table-bordered" id="resultTableBuy">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Precio</th>
              <th>Mínimo</th>
              <th>Máximo</th>
              <th>Tipo</th>
              <th>BTC</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="col">
        <!-- <h4>Precios de Venta (SELL)</h4> -->
        <table class="table table-dark table-striped table-bordered" id="resultTableSell">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Precio</th>
              <th>Mínimo</th>
              <th>Máximo</th>
              <th>Tipo</th>
              <th>BTC</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>


  <script src="/js/bootstrap.bundle.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script>
    const form = document.getElementById("uploadForm");
    const fileList = document.getElementById("fileList");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData();
      const files = document.getElementById("fileInput").files;

      for (let i = 0; i < files.length; i++) {
        formData.append("file", files[i]);
      }

      const response = await fetch("/upload", { method: "POST", body: formData });
      const result = await response.json();
    });

    async function loadFiles() {
      const response = await fetch("/file");
      const files = await response.json();

      const fileList = document.getElementById("fileList");
      fileList.innerHTML = "";

      files.forEach((f) => {
        const li = document.createElement("li");
        li.innerHTML = `
        <a href="${f.url}" download>${f.name}</a>
        <button onclick="deleteFile('${f.name}')">Borrar</button>
        `;
        fileList.appendChild(li);
      });
    }

    async function deleteFile(filename) {
      const response = await fetch(`/file/${filename}`, { method: "DELETE" });
      const result = await response.json();
      alert(result.message || result.error);
      loadFiles(); // recargar lista
    }

    // Cargar al iniciar
    loadFiles();


    let lastBuyPrice = null;
    let lastSellPrice = null;

    // Conectar al servidor
    const SERVER_URL = "https://cfo-backend-production-11a4.up.railway.app";
    //const SERVER_URL = "http://localhost:3000";
    const socket = io(SERVER_URL);

    // Escuchar el evento binancePrices
    socket.on("binancePrices", (data) => {

      // Actualizar tabla de BUY
      // --- Tabla BUY ---
      const tbodyBuy = document.querySelector("#resultTableBuy tbody");
      tbodyBuy.innerHTML = "";
      const minBuyPrice = Math.min(...data.buy.map(item => parseFloat(item.precio)));
      data.buy.forEach((item, index) => {
        const currentPrice = parseFloat(item.precio);
        const highlightClass = currentPrice === minBuyPrice ? "table-success" : "";
        const row = `<tr class="${highlightClass}">
          <td>${item.nombre}</td>
          <td>${item.precio}</td>
          <td>${item.minimo}</td>
          <td>${item.maximo}</td>
          <td>${item.tipo}</td>
          <td>${item.buyerBtcPositionLimit ||
          item.buyerRegDaysLimit ||
          item.buyerKycLimit ||
          item.takerAdditionalKycRequired
          }</td >
        </tr>`;
        tbodyBuy.innerHTML += row;
      });

      // Actualizar tabla de SELL
      // --- Tabla SELL ---
      const tbodySell = document.querySelector("#resultTableSell tbody");
      tbodySell.innerHTML = "";
      const maxBuyPrice = Math.max(...data.sell.map(item => parseFloat(item.precio)));
      data.sell.forEach((item, index) => {
        const currentPrice = parseFloat(item.precio);
        const highlightClass = currentPrice === maxBuyPrice ? "table-danger" : "";
        const row = `<tr class="${highlightClass}">
          <td>${item.nombre}</td>
          <td>${item.precio}</td>
          <td>${item.minimo}</td>
          <td>${item.maximo}</td>
          <td>${item.tipo}</td>
          <td>${item.buyerBtcPositionLimit ||
          item.buyerRegDaysLimit ||
          item.buyerKycLimit ||
          item.takerAdditionalKycRequired
          }</td >
        </tr > `;
        tbodySell.innerHTML += row;
      });
    });

    function showAlert(message, type = "danger") {
      const alertBox = document.getElementById("alertBox");
      const alertMessage = document.getElementById("alertMessage");

      alertBox.className = `alert alert - ${type} alert - dismissible fade show position - fixed top - 0 end - 0 m - 3`;
      alertMessage.innerText = message;
      alertBox.style.display = "block";
    }

  </script>

</body>

</html>
